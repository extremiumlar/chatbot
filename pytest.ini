[pytest]
# DIQQAT: testpaths FAQAT ko'prik fayliga ishora qiladi. Sabab: tests/ ichidagi
# eski standalone skriptlar (test_hybrid_units.py, test_price_guard.py,
# test_stage*.py) modul DARAJASIDA `sys.exit()` chaqiradi (standalone rejimini
# saqlab qolish uchun ATAYIN shunday) — pytest ularni TO'G'RIDAN-TO'G'RI import
# qilsa, kolleksiya bosqichida SystemExit bilan yiqiladi (INTERNALERROR).
# Ular pytest.py::test_pytest_bridge.py orqali SUBPROCESS sifatida chaqiriladi —
# standalone invokatsiyalari (`python tests/xxx.py`) o'zgarishsiz ishlayveradi.
testpaths = tests/test_pytest_bridge.py
markers =
    live: haqiqiy tashqi API (Gemini/Uysot) so'rovi yuboradi — sekin, kvota sarflaydi.
          Kundalik/CI ishlatish uchun: pytest -m "not live" (faqat oflayn testlar).
          Bare `pytest` (bayroqsiz) barchasini — jumladan live'ni ham — yuritadi.
addopts = -q
